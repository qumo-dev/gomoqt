ignore:
  # Pure delegation wrappers — zero logic, one-line delegates only.
  - "moqt/internal/quicgo/"
  - "moqt/internal/webtransportgo/"
  # CLI / interop binaries and build tooling are not library code.
  - "cmd/"
  - "magefiles/"
  # TS internals and CLI tooling
  - "moq-web/src/internal/"
  - "moq-web/cli/"

flag_management:
  individual_flags: true

flags:
  go:
    # Core Go library: moqt session/server/track logic + msf media format helpers.
    paths:
      - moqt/
      - msf/
    carryforward: false
  ts:
    # Core TS library: session, track, msf.
    paths:
      - moq-web/src/
    carryforward: false

coverage:
  status:
    project:
      go:
        target: 75%
        threshold: 2%
        flags:
          - go
      moq-web-deno:
        target: 70%
        threshold: 5%
        flags:
          - moq-web-deno
    patch:
      go:
        target: 70%
        threshold: 5%
        flags:
          - go
      moq-web-deno:
        target: 65%
        threshold: 5%
        flags:
          - moq-web-deno
