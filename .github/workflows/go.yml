# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    # Only run the full suite for PRs that touch Go code so we don't pay
    # for benchmark/race jobs on docs-only changes.
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "magefiles/**"
      - ".github/workflows/go.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.0"

      - name: Test
        run: go test -v ./...

      - name: Test with coverage
        # Scope to library packages (moqt + transport) so cross-package
        # execution (e.g. moqt tests exercising moqt/internal/* and transport)
        # is attributed. cmd/examples/msf mains are excluded — they aren't
        # unit-tested, so including them reads as uncovered and noises up
        # codecov/patch without flagging real gaps.
        run: go test -coverprofile=coverage.out -covermode=atomic -coverpkg=./moqt/...,./transport/... ./moqt/... ./transport/...

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: go
          name: go-coverage
          fail_ci_if_error: false
          verbose: true

  # Race detection requires CGO + a C compiler (gcc). The ubuntu runner has
  # gcc; local dev machines without gcc cannot run -race. We isolate it in
  # its own job so the rest of CI is unaffected by CGO_ENABLED.
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.0"

      - name: Test with -race
        env:
          # -race needs CGO and a C compiler; ubuntu-latest ships gcc.
          CGO_ENABLED: "1"
        run: |
          # Run the full moqt suite under the race detector. This covers the
          # concurrent-access regression tests (e.g. TestSession_ConcurrentAccess
          # and the trackReaders map at session.go ~732).
          go test -race -count=1 -timeout=10m ./moqt/...

  # Microbenchmark baseline capture. Runs ONLY on push (main/tags) and manual
  # dispatch to produce the bench-baseline artifact that the performance-check
  # label workflow (.github/workflows/benchmark-label.yml) compares PRs against.
  # Benchmarking a PR is NOT done here -- add the `performance-check` label to a
  # PR and benchmark-label.yml runs the comparison and posts it as a comment.
  # Microbenchmarks only (fast, stable signal); the slow broadcast/QUIC
  # integration suite runs in the benchmark-integration job below.
  benchmark:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.0"

      - name: Run benchmarks (micro)
        # Microbenchmarks only: -short skips the slow real-QUIC integration
        # benchmarks (each calls testing.Short() -> b.Skip). They run in
        # benchmark-integration below, without -short.
        # -benchtime=1s gives a stable mean (1x had ~150% CV on micros);
        # -count=10 gives benchstat enough samples to estimate variance.
        run: |
          go test -run='^$' -bench=. -short -benchmem -benchtime=1s -count=10 -timeout=15m ./moqt/... | tee bench-new.txt

      - name: Upload baseline
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline
          path: bench-new.txt
          retention-days: 90

  # Slow real-QUIC integration benchmarks. Runs the FULL benchmark suite WITHOUT
  # -short, so the benchmarks that self-skip under testing.Short() actually run
  # here. Each op is a multi-second aggregate (frames/sec, MB/s) stable across
  # samples, so -benchtime=1x is appropriate (unlike the microbenchmarks above).
  # Runs only on push (main/tags) and manual dispatch — NOT on PRs — because it
  # costs ~10-19 runner-minutes. Uploaded for trend archival only; no benchstat gate.
  benchmark-integration:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.0"

      - name: Run integration benchmarks
        run: |
          go test -run='^$' -bench=. -benchmem -benchtime=1x -count=5 -timeout=25m ./moqt/... | tee bench-integration.txt

      - name: Upload integration bench output
        uses: actions/upload-artifact@v4
        with:
          name: bench-integration
          path: bench-integration.txt
          retention-days: 90
